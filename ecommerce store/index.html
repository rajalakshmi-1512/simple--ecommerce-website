<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CodeAlpha E-Commerce Store</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>Welcome to CodeAlpha E-Commerce Store</h1>

    <h2>Products</h2>

    <div class="product">
        <h3>Headphones</h3>
        <p>Price: ₹999</p>
        <button onclick="addToCart('Headphones',999)">Add to Cart</button>
    </div>

    <div class="product">
        <h3>Smart Watch</h3>
        <p>Price: ₹1999</p>
        <button onclick="addToCart('Smart Watch',1999)">Add to Cart</button>
    </div>

    <div class="product">
        <h3>Shoes</h3>
        <p>Price: ₹1499</p>
        <button onclick="addToCart('Shoes',1499)">Add to Cart</button>
    </div>

    <hr>

    <h2>Shopping Cart</h2>

    <ul id="cart-items"></ul>

    <h3>Total: ₹<span id="total-price">0</span></h3>

    <script src="script.js"></script>

</body>
</html>
